<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Motors - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <img src="img/logo.png" alt="Elite Motors">
                <span>ELITE MOTORS</span>
            </div>
            <h2>Acceso Administrador</h2>
            <p>Ingresa tus credenciales para gestionar el catálogo</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="loginEmail" placeholder="admin@elitemotors.com" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-gold" style="width:100%; justify-content:center;">
                    <i class="fas fa-sign-in-alt"></i> Ingresar
                </button>
            </form>
            <div id="loginError" style="display:none; color:#ff4757; margin-top:16px; text-align:center; font-size:14px;"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
