<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Motors</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <header>

        <div class="logo">

            ELITE MOTORS

        </div>

        <nav>

            <a href="#">Inicio</a>

            <a href="#">Inventario</a>

            <a href="#">Contacto</a>

        </nav>

    </header>

    <section class="hero">

        <h1>Encuentra el vehículo ideal para ti</h1>

        <p>
            Vehículos seleccionados con calidad, respaldo y el mejor precio.
        </p>

        <input type="text" placeholder="Buscar vehículo...">

    </section>

    <section class="catalogo">

        <!-- Tarjeta -->

        <div class="card">

            <img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?w=900" alt="">

            <div class="info">

                <h2>BMW 120i 2018</h2>

                <span>$65.000.000</span>

                <button>Ver vehículo</button>

            </div>

        </div>

        <div class="card">

            <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=900" alt="">

            <div class="info">

                <h2>Mercedes GLA 200</h2>

                <span>$74.900.000</span>

                <button>Ver vehículo</button>

            </div>

        </div>

    </section>

</body>

</html>
