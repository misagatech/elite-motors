<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Elite Motors</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

</head>

<body>

    <header>

        <div class="logo">

            <img src="img/logo.png">

            <div>

                <h2>ELITE MOTORS</h2>

                <p>Exclusividad que te lleva más lejos</p>

            </div>

        </div>

        <nav>

            <a href="">Inicio</a>

            <a href="">Inventario</a>

            <a href="">Contacto</a>

        </nav>

    </header>

    <section class="hero">

        <div class="overlay"></div>

        <div class="hero-content">

            <img src="img/logo.png" class="hero-logo" alt="Elite Motors">

            <span class="hero-slogan">
                EXCLUSIVIDAD QUE TE LLEVA MÁS LEJOS
            </span>

            <h1>
                ENCUENTRA EL<br>
                VEHÍCULO IDEAL
            </h1>

            <div class="linea-dorada"></div>

            <p>
                Vehículos seleccionados con calidad, respaldo
                y el mejor precio del mercado.
            </p>

            <a href="#inventario" class="btn-gold">
                VER INVENTARIO →
            </a>

        </div>

    </section>

    <section class="filtros">

        <button>Todos</button>

        <button>BMW</button>

        <button>Mercedes</button>

        <button>Mazda</button>

        <button>Automático</button>

        <button>Manual</button>

    </section>

    <section class="catalogo">

    </section>

</body>

</html>
